services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.4.2
    restart: unless-stopped
    environment:
      cluster.name: flames
      node.name: elasticsearch
      discovery.type: single-node
      ES_JAVA_OPTS: "-Xms${DATABASE_SEARCH_ELASTICSEARCH_HEAP_SIZE:-256m} -Xmx${DATABASE_SEARCH_ELASTICSEARCH_HEAP_SIZE:-256m}"
      xpack.security.enabled: "false"
      xpack.security.http.ssl.enabled: "false"
      xpack.security.transport.ssl.enabled: "false"
      bootstrap.memory_lock: "true"
      ELASTIC_PASSWORD: ${DATABASE_SEARCH_ELASTICSEARCH_PASSWORD}
    ports:
      - "${DATABASE_SEARCH_ELASTICSEARCH_PORT:-${DATABASE_SEARCH_ELASTICSEARCH_PORT_FORWARDED:-9200}}:9200"
    volumes:
      - elasticsearch:/usr/share/elasticsearch/data
    networks:
      - flames
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  elasticsearch:
