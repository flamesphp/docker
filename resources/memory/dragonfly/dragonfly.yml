services:
  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.38.1
    restart: unless-stopped
    command: >
      --maxmemory=${DATABASE_MEMORY_DRAGONFLY_MAX_MEMORY:-512mb}
      --requirepass=${DATABASE_MEMORY_DRAGONFLY_PASSWORD}
      --proactor_threads=${DATABASE_MEMORY_DRAGONFLY_THREADS:-2}
      --save_schedule=""
      --tcp_backlog=511
      --hz=100
    ports:
      - "${DATABASE_MEMORY_DRAGONFLY_PORT:-${DATABASE_MEMORY_DRAGONFLY_PORT_FORWARDED:-6381}}:6379"
    volumes:
      - dragonfly:/data
    networks:
      - flames
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${DATABASE_MEMORY_DRAGONFLY_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  dragonfly:
