services:

  app:
    build:
      context: vendor/flamesphp/docker/resource
      dockerfile: image/apache_modphp/Dockerfile
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    networks:
      - flames
    ports:
      - "${APP_PORT:-${APP_FORWARDED_PORT:-8080}}:80"
      - "${APP_PORT_SSL:-${APP_PORT_SSL_FORWARDED:-8443}}:443"
    environment:
      IDE: ${IDE:-phpstorm}
      XDEBUG: ${XDEBUG:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  flames:
    driver: bridge
