services:
  mariadb:
    image: mariadb:11.8
    restart: unless-stopped
    command: >
      --innodb-buffer-pool-size=${DATABASE_MARIADB_BUFFER_POOL_SIZE:-256M}
      --max-connections=${DATABASE_MARIADB_MAX_CONNECTIONS:-1000}
    environment:
      MARIADB_DATABASE: ${DATABASE_MARIADB_NAME}
      MARIADB_USER: ${DATABASE_MARIADB_USER}
      MARIADB_PASSWORD: ${DATABASE_MARIADB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DATABASE_MARIADB_PASSWORD}
    ports:
      - "${DATABASE_MARIADB_PORT:-${DATABASE_MARIADB_PORT_FORWARDED:-3306}}:3306"
    volumes:
      - mariadb:/var/lib/mysql
      - ./vendor/flamesphp/docker/resources/database/mariadb/my.cnf:/etc/mysql/conf.d/flames.cnf:ro
    networks:
      - flames
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mariadb:
