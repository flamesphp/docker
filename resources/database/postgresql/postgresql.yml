services:
  postgresql:
    # pgvector + PostGIS on Debian trixie (matches postgres:18 collation/glibc)
    build:
      context: .
      dockerfile: vendor/flamesphp/docker/resources/database/postgresql/Dockerfile
    restart: unless-stopped
    command: >
      postgres
      -c config_file=/etc/postgresql/flames.conf
      -c shared_buffers=${DATABASE_POSTGRESQL_SHARED_BUFFERS:-256MB}
      -c max_connections=${DATABASE_POSTGRESQL_MAX_CONNECTIONS:-200}
    environment:
      POSTGRES_DB: ${DATABASE_POSTGRESQL_NAME}
      POSTGRES_USER: ${DATABASE_POSTGRESQL_USER}
      POSTGRES_PASSWORD: ${DATABASE_POSTGRESQL_PASSWORD}
    ports:
      - "${DATABASE_POSTGRESQL_PORT:-${DATABASE_POSTGRESQL_PORT_FORWARDED:-5432}}:5432"
    volumes:
      - postgresql:/var/lib/postgresql/18/data
      - ./vendor/flamesphp/docker/resources/database/postgresql/postgresql.conf:/etc/postgresql/flames.conf:ro
      - ./vendor/flamesphp/docker/resources/database/postgresql/init/01-vector.sh:/docker-entrypoint-initdb.d/01-vector.sh:ro
    networks:
      - flames
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgresql:
