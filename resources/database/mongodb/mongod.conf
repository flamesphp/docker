# ─── Storage ──────────────────────────────────────────────────────────────────
storage:
  dbPath: /data/db
  wiredTiger:
    engineConfig:
      # cacheSizeGB is set via .env (see mongodb.yml command)
      journalCompressor: snappy
    collectionConfig:
      blockCompressor: snappy
    indexConfig:
      prefixCompression: true

# ─── Network ──────────────────────────────────────────────────────────────────
net:
  bindIp: 0.0.0.0
  maxIncomingConnections: 1000
  compression:
    compressors: snappy,zstd,zlib

# ─── Profiling (slow query log) ───────────────────────────────────────────────
operationProfiling:
  mode: slowOp
  slowOpThresholdMs: 1000
