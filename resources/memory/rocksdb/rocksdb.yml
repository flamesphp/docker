services:
  rocksdb:
    image: facebook/rocksdb:11.1.1
    restart: unless-stopped
    ports:
      - "${DATABASE_MEMORY_ROCKSDB_PORT:-${DATABASE_MEMORY_ROCKSDB_PORT_FORWARDED:-6383}}:6383"
    volumes:
      - rocksdb:/rocksdb-data
    networks:
      - flames
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

volumes:
  rocksdb:
