services:
  opensearch:
    image: opensearchproject/opensearch:3.6.0
    restart: unless-stopped
    environment:
      cluster.name: flames
      node.name: opensearch
      discovery.type: single-node
      OPENSEARCH_JAVA_OPTS: "-Xms${DATABASE_SEARCH_OPENSEARCH_HEAP_SIZE:-256m} -Xmx${DATABASE_SEARCH_OPENSEARCH_HEAP_SIZE:-256m}"
      DISABLE_SECURITY_PLUGIN: "true"
      bootstrap.memory_lock: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${DATABASE_SEARCH_OPENSEARCH_PASSWORD}
    ports:
      - "${DATABASE_SEARCH_OPENSEARCH_PORT:-${DATABASE_SEARCH_OPENSEARCH_PORT_FORWARDED:-9200}}:9200"
    volumes:
      - opensearch:/usr/share/opensearch/data
    networks:
      - flames
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  opensearch:
