services:

  app:
    build:
      context: .
      dockerfile: vendor/flamesphp/docker/resources/app/nginx_flames/Dockerfile
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    networks:
      - flames
    ports:
      - "${APP_PORT:-${APP_FORWARDED_PORT:-8080}}:80"
      - "${APP_PORT_SSL:-${APP_PORT_SSL_FORWARDED:-8443}}:443"
    environment:
      IDE: ${IDE:-phpstorm}
      READY_WORKERS:        ${READY_WORKERS:-0}
      READY_WORKER_TTL:     ${READY_WORKER_TTL:-300}
      READY_WORKER_TIMEOUT: ${READY_WORKER_TIMEOUT:-900}
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  flames:
    driver: bridge
