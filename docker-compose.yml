#      context: resources/data/php-fpm
#    container_name: ${APP_NAME:-flames}-php-fpm
#    restart: unless-stopped
#    volumes:
#      - ../../../:/var/www/html
#    depends_on:
#      - db
#    networks:
#      - flames

networks:
  flames:
    driver: bridge

volumes:
  mariadb_data:
