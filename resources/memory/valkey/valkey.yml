services:
  valkey:
    image: valkey/valkey:9.1
    restart: unless-stopped
    command: >
      valkey-server /etc/valkey/flames.conf
      --maxmemory ${DATABASE_MEMORY_VALKEY_MAX_MEMORY:-256mb}
      --requirepass ${DATABASE_MEMORY_VALKEY_PASSWORD}
    ports:
      - "${DATABASE_MEMORY_VALKEY_PORT:-${DATABASE_MEMORY_VALKEY_PORT_FORWARDED:-6382}}:6379"
    volumes:
      - valkey:/data
      - ./vendor/flamesphp/docker/resources/memory/valkey/valkey.conf:/etc/valkey/flames.conf:ro
    networks:
      - flames
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${DATABASE_MEMORY_VALKEY_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  valkey:
