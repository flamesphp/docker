more_clear_headers Server;
more_clear_headers X-Powered-By;

upstream flames_ready {
    server unix:/var/run/flames-ready/worker.sock;
    keepalive 16;
    keepalive_timeout 5s;
    keepalive_requests 100;
}

server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.php;
    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass  flames_ready;
        fastcgi_index index.php;
        include       fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;

        fastcgi_buffering         on;
        fastcgi_buffer_size       128k;
        fastcgi_buffers           4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_connect_timeout   60s;
        fastcgi_send_timeout      300s;
        fastcgi_read_timeout      300s;
        access_log                off;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|webp|avif|svg|css|js|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~ /\. {
        deny all;
    }

    add_header X-Content-Type-Options "nosniff" always;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;
}

server {
    listen 443 ssl;
    server_name localhost;
    root /var/www/html/public;
    index index.php;
    charset utf-8;

    ssl_certificate     /etc/ssl/certs/flames-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/flames-selfsigned.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass  flames_ready;
        fastcgi_index index.php;
        include       fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;

        fastcgi_buffering         on;
        fastcgi_buffer_size       128k;
        fastcgi_buffers           4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_connect_timeout   60s;
        fastcgi_send_timeout      300s;
        fastcgi_read_timeout      300s;
        access_log                off;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|webp|avif|svg|css|js|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~ /\. {
        deny all;
    }

    add_header X-Content-Type-Options "nosniff" always;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;
}
