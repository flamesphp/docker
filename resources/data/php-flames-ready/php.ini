; Config
memory_limit = -1
upload_max_filesize = 100M
post_max_size = 108M
max_execution_time = 300

; Error reporting
display_errors = On
display_startup_errors = Off
error_reporting = E_ALL
html_errors = On
log_errors = On

; Opcache
opcache.enable                = 1
opcache.enable_cli            = 1        ; REQUIRED: opcache is off in CLI by default
opcache.revalidate_freq       = 0        ; worker never reloads files, no need to check
opcache.max_accelerated_files = 20000
opcache.memory_consumption    = 256
opcache.interned_strings_buffer = 16
opcache.save_comments         = 1

; JIT – tracing mode (best for long-running workers)
; Functions called during register_load are cold (run once) → bytecode only
; Functions called during request loop become hot → JIT-compiled to native code
opcache.jit                   = tracing   ; tracing = best for workers
opcache.jit_buffer_size       = 128M
opcache.jit_hot_func          = 127       ; function must run 127x before JIT kicks in

; PHAR
phar.readonly = Off

; Xdebug
;xdebug.mode = debug
;xdebug.discover_client_host = 0
;xdebug.client_host = host.docker.internal
