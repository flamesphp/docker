# ─── Connection ───────────────────────────────────────────────────────────────
# max_connections is set via .env (see postgresql.yml command)

# ─── Memory ───────────────────────────────────────────────────────────────────
# shared_buffers is set via .env (see postgresql.yml command)
# Recommended: 25% of available RAM in production (e.g. 512MB, 2GB, 8GB)
effective_cache_size         = 768MB
work_mem                     = 16MB
maintenance_work_mem         = 128MB

# ─── WAL & Checkpoints ────────────────────────────────────────────────────────
# off = flush once/sec — best throughput, minimal risk (OS crash only)
synchronous_commit           = off
wal_buffers                  = 16MB
max_wal_size                 = 2GB
min_wal_size                 = 256MB
checkpoint_completion_target = 0.9

# ─── I/O (optimized for SSD) ──────────────────────────────────────────────────
random_page_cost             = 1.1
effective_io_concurrency     = 200
default_statistics_target    = 100

# ─── Logging ──────────────────────────────────────────────────────────────────
log_min_duration_statement   = 1000

# ─── Locale & Encoding ────────────────────────────────────────────────────────
lc_messages                  = 'en_US.utf8'
lc_monetary                  = 'en_US.utf8'
lc_numeric                   = 'en_US.utf8'
lc_time                      = 'en_US.utf8'
